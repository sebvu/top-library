<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/jester-css-framework.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/script.js" defer></script>
    <title>TOP Library Project</title>
  </head>
  <body>
    <div class="container">
      <header class="header --size-context-xl">
        <h1 class="header__logo _text _text--header _text--bold">
          Reader Tracker
        </h1>
        <div class="header__buttons-container --size-context-xxxl">
          <button class="header__add-button">
            <span class="_text _text--normal _text--bold --size-context-rg"
              >Add Book</span
            >
          </button>
          <button class="header__toggle-button">
            <svg
              class="header__toggle-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <path
                d="M7.5,2C5.71,3.15 4.5,5.18 4.5,7.5C4.5,9.82 5.71,11.85 7.53,13C4.46,13 2,10.54 2,7.5A5.5,5.5 0 0,1 7.5,2M19.07,3.5L20.5,4.93L4.93,20.5L3.5,19.07L19.07,3.5M12.89,5.93L11.41,5L9.97,6L10.39,4.3L9,3.24L10.75,3.12L11.33,1.47L12,3.1L13.73,3.13L12.38,4.26L12.89,5.93M9.59,9.54L8.43,8.81L7.31,9.59L7.65,8.27L6.56,7.44L7.92,7.35L8.37,6.06L8.88,7.33L10.24,7.36L9.19,8.23L9.59,9.54M19,13.5A5.5,5.5 0 0,1 13.5,19C12.28,19 11.15,18.6 10.24,17.93L17.93,10.24C18.6,11.15 19,12.28 19,13.5M14.6,20.08L17.37,18.93L17.13,22.28L14.6,20.08M18.93,17.38L20.08,14.61L22.28,17.15L18.93,17.38M20.08,12.42L18.94,9.64L22.28,9.88L20.08,12.42M9.63,18.93L12.4,20.08L9.87,22.27L9.63,18.93Z"
              />
            </svg>
          </button>
        </div>
      </header>
      <!-- ----- -->
      <section class="main-content"></section>
      <!-- ----- -->
    </div>
    <!-- temporary -->
    <dialog class="dialog --size-context-md" open>
      <p class="dialog__title _text _text--header _text--bold">Add Book</p>
      <form class="dialog__form --size-context-sm" action="" method="">
        <div class="dialog__form-top">
          <p class="dialog__form-please _text _text--normal">
            Please complete all required (<span
              class="dialog__form-required _text _text--bold"
              >*</span
            >) fields.
          </p>
          <p class="dialog__form-top-p">
            <label
              class="dialog__form-label dialog__form-label--text _text _text--normal"
              for="title"
              >Title</label
            >
            <input
              class="dialog__form-input dialog__form-input--text _text _text--normal _text--bold --size-context-xs"
              type="text"
              id="title"
              name="book_title"
              required
            />
            <span></span>
          </p>
          <p class="dialog__form-top-p">
            <label
              class="dialog__form-label dialog__form-label--text _text _text--normal"
              for="author"
              >Author</label
            >
            <input
              class="dialog__form-input dialog__form-input--text _text _text--normal _text--bold --size-context-xs"
              type="text"
              id="author"
              name="book_title"
              required
            />
            <span></span>
          </p>
          <div class="dialog__form-top-div">
            <p class="dialog__form-top-div-p dialog__form-top-div-p--left">
              <label
                class="dialog__form-label dialog__form-label--number _text _text--normal"
                for="pages"
                >Pages</label
              >
              <input
                class="dialog__form-input dialog__form-input--number _text _text--normal _text--bold --size-context-xs"
                type="number"
                step="100"
                id="pages"
                name="book_pages"
                max="100000"
                required
              />
              <span></span>
            </p>
            <p
              class="dialog__form-top-div-p dialog__form-top-div-p--right dialog__form-top-div-p--gap"
            >
              <label
                class="dialog__form-label dialog__form-label--checkbox _text _text--normal"
                for="has-read"
                >Has Read</label
              >
              <input
                class="dialog__form-input dialog__form-input--checkbox _text _text--normal _text--bold --size-context-xs"
                type="checkbox"
                id="has-read"
                name="book_has-read"
              />
            </p>
          </div>
          <p class="dialog__form-top-p">
            <label
              class="dialog__form-label dialog__form-label--image _text _text--normal"
              for="image"
              >Cover</label
            >
            <input
              class="dialog__form-input--image _text _text--normal _text--bold --size-context-xs"
              type="file"
              id="image"
              name="book_cover"
              accept="image/*.png, image/*.jpeg, image/*.jpg"
            />
          </p>
        </div>
        <div class="dialog__form-bottom">
          <div class="dialog__form-cover-container">
            <img
              src=""
              class="dialog__form-cover-img"
              alt="Book Cover Selected"
              onerror="this.src = './assets/images/default-cover.jpg'"
            />
            <!-- define this onerror as a function when js -->
          </div>
          <div class="dialog__form-bottom-div --size-context-rg">
            <button
              class="dialog__form-button _text _text--header _text--bold"
              submit
            >
              Submit
            </button>
          </div>
        </div>
      </form>
    </dialog>
  </body>
</html>
